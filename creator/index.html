<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Kreator Etap 1</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <link rel="stylesheet" href="../assets/creator.css">
</head>
<body>
  <main class="creator-page">
    <section class="creator-card">
      <h1 class="creator-title">KREATOR: ETAP 1</h1>
      <form class="creator-form" action="#" method="post" onsubmit="return false;">
        <div class="field">
          <label class="field-label" for="name">Wprowadź imię</label>
          <input class="field-input" id="name" type="text" placeholder="Adam" autocomplete="off">
        </div>
        <div class="field">
          <label class="field-label" for="surname">Wprowadź nazwisko</label>
          <input class="field-input" id="surname" type="text" placeholder="Nowak" autocomplete="off">
        </div>
        <div class="field">
          <label class="field-label" for="birthdate">Wprowadź datę urodzenia</label>
          <input class="field-input" id="birthdate" type="text" placeholder="20.05.2007" autocomplete="off">
        </div>
        <div class="field">
          <label class="field-label" for="sex">Wybierz płeć</label>
          <input class="field-input" id="sex" type="text" placeholder="Mężczyzna" autocomplete="off">
        </div>
        <div class="field">
          <label class="field-label" for="motherSurname">Wprowadź nazwisko matki</label>
          <input class="field-input" id="motherSurname" type="text" placeholder="Kowalska" autocomplete="off">
        </div>
        <div class="field">
          <label class="field-label" for="fatherSurname">Wprowadź nazwisko ojca</label>
          <input class="field-input" id="fatherSurname" type="text" placeholder="Nowak" autocomplete="off">
        </div>
        <div class="field">
          <label class="field-label" for="city">Wprowadź miasto</label>
          <input class="field-input" id="city" type="text" placeholder="Poznań" autocomplete="off">
        </div>
        <div class="creator-actions">
          <button class="submit-btn" type="submit">GOTOWE</button>
        </div>
      </form>
    </section>
  </main>
</body>
</html>
